; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps = 
    TFT_eSPI
build_flags = 
    -DUSER_SETUP_LOADED=1

    ; ST7735 driver
    -DST7735_DRIVER=1

    ; Display dimensions - adjust based on your display
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=160

    ; CRITICAL: Display variant selection
    ; Try different options if colors are wrong or display is shifted
    -DST7735_GREENTAB2      ; Common for 1.8" displays
    ; -DST7735_GREENTAB      ; Alternative green tab
    ; -DST7735_REDTAB        ; For red tab displays
    ; -DST7735_BLACKTAB      ; For black tab displays
    ; -DST7735_GREENTAB128   ; For 128x128 displays

    ; Color inversion (uncomment if colors are inverted)
    #define TFT_INVERSION_OFF
    ; #define TFT_INVERSION_ON

    ; ESP32 SPI pin definitions - CHANGE THESE to match your wiring [citation:5][citation:9]
    -DTFT_MOSI=23            ; SPI MOSI (SDA on display)
    -DTFT_SCLK=18            ; SPI Clock (SCL/SCK on display)
    -DTFT_CS=5               ; Chip Select (CS)
    -DTFT_DC=32              ; Data/Command (DC/A0)
    -DTFT_RST=15            ; Reset (RST) [citation:9]
    ; -DTFT_RST=-1            ; Use -1 if connected to ESP32 reset pin [citation:2]
    ; -DTFT_BL=4              ; Optional backlight control pin

    ; SPI frequency
    -DSPI_FREQUENCY=27000000 ; 27MHz is stable for most displays [citation:7][citation:8]

    ; Load fonts
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
